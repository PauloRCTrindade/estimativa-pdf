<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Head -->
  <circle cx="100" cy="80" r="45" fill="#f4a460" stroke="#8b7355" stroke-width="2"/>
  
  <!-- Hair -->
  <path d="M 60 50 Q 55 30 100 25 Q 145 30 140 50" fill="#2d2d2d" stroke="#000" stroke-width="1.5"/>
  
  <!-- Eyes -->
  <circle cx="85" cy="75" r="6" fill="#000"/>
  <circle cx="115" cy="75" r="6" fill="#000"/>
  
  <!-- Pupils looking up (thinking expression) -->
  <circle cx="85" cy="73" r="3" fill="#fff"/>
  <circle cx="115" cy="73" r="3" fill="#fff"/>
  
  <!-- Mouth (thinking) -->
  <path d="M 90 95 Q 100 98 110 95" stroke="#8b5a3c" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Hand on chin (thinking pose) -->
  <ellipse cx="55" cy="105" rx="12" ry="18" fill="#f4a460" stroke="#8b7355" stroke-width="1.5"/>
  <!-- Fingers -->
  <circle cx="48" cy="100" r="4" fill="#f4a460" stroke="#8b7355" stroke-width="1.5"/>
  <circle cx="45" cy="108" r="4" fill="#f4a460" stroke="#8b7355" stroke-width="1.5"/>
  
  <!-- Neck -->
  <rect x="90" y="120" width="20" height="15" fill="#f4a460" stroke="#8b7355" stroke-width="1.5"/>
  
  <!-- Shirt/Body -->
  <rect x="60" y="135" width="80" height="60" fill="#1a472a" stroke="#000" stroke-width="2" rx="5"/>
  
  <!-- Shirt details - pattern -->
  <line x1="70" y1="135" x2="70" y2="195" stroke="#2d5a3d" stroke-width="1" opacity="0.5"/>
  <line x1="85" y1="135" x2="85" y2="195" stroke="#2d5a3d" stroke-width="1" opacity="0.5"/>
  <line x1="100" y1="135" x2="100" y2="195" stroke="#2d5a3d" stroke-width="1" opacity="0.5"/>
  <line x1="115" y1="135" x2="115" y2="195" stroke="#2d5a3d" stroke-width="1" opacity="0.5"/>
  <line x1="130" y1="135" x2="130" y2="195" stroke="#2d5a3d" stroke-width="1" opacity="0.5"/>
  
  <!-- Thought cloud -->
  <g opacity="0.3">
    <circle cx="160" cy="40" r="15" fill="none" stroke="#999" stroke-width="1.5"/>
    <circle cx="140" cy="25" r="12" fill="none" stroke="#999" stroke-width="1.5"/>
    <circle cx="155" cy="15" r="10" fill="none" stroke="#999" stroke-width="1.5"/>
  </g>
  
  <!-- Connector from head to thought bubble -->
  <circle cx="150" cy="50" r="3" fill="#999" opacity="0.3"/>
  <circle cx="158" cy="42" r="2" fill="#999" opacity="0.3"/>
</svg>